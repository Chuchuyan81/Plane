<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKY ACE 3D: Arcade Shooter</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Arial', sans-serif; 
            background-color: #87CEEB; 
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        /* Стили для HUD (слой интерфейса) */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            box-sizing: border-box;
        }
        #orientation-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #2c3e50;
            color: white;
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .phone-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: rotate 2s infinite ease-in-out;
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
            100% { transform: rotate(0deg); }
        }
        button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            min-width: 200px;
        }
        button:active { transform: scale(0.95); }
        
        #joystick-base {
            position: absolute;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: none;
            z-index: 5;
            pointer-events: none;
        }
        #joystick-stick {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            top: 25px;
            left: 25px;
        }
        /* Базовые стили для экранов */
        .menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            z-index: 10;
            pointer-events: auto;
        }

        /* Классы видимости */
        .hidden {
            display: none !important;
        }
        .active {
            display: flex !important;
        }

        /* Кнопки (Удобно для пальца) */
        .game-btn {
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            font-weight: bold;
            min-width: 200px;
            min-height: 50px; /* Минимум 44px для тач-интерфейсов */
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .game-btn:active { transform: scale(0.95); }

        /* HUD в игре */
        #game-hud {
            background: transparent;
            justify-content: flex-start;
            pointer-events: none;
            flex-direction: column;
        }
        .hud-top {
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            background: rgba(0,0,0,0.3);
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 5px;
        }
        #combo-container {
            font-size: 24px;
            color: #fffa65;
            transition: transform 0.1s;
        }
        .combo-active { transform: scale(1.2); }
        
        #boss-hp-container {
            width: 80%;
            height: 10px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #fff;
            margin: 10px 0;
            display: none;
            position: relative;
        }
        #boss-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            color: #ff4d4d;
            font-weight: bold;
            text-shadow: 2px 2px 4px black;
            display: none;
            animation: blink 0.5s infinite;
            z-index: 100;
        }
        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        #boss-hp-bar {
            width: 100%;
            height: 100%;
            background: #ff4d4d;
            transition: width 0.2s;
        }
        #boss-name {
            position: absolute;
            top: -15px;
            left: 0;
            font-size: 12px;
            color: white;
        }

        #powerups-hud {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: none;
        }
        .powerup-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            border: 2px solid white;
        }
        .powerup-icon.shield { border-color: #3498db; }
        .powerup-icon.speed { border-color: #2ecc71; }
        .powerup-icon.multishot { border-color: #f1c40f; }

        .icon-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            pointer-events: auto;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            font-size: 20px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .icon-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div id="orientation-overlay">
    <div class="phone-icon">📱</div>
    <h2>Пожалуйста, поверните устройство</h2>
    <p>Игра работает лучше всего в портретном (вертикальном) режиме.</p>
</div>

<!-- Контейнер интерфейса -->
<div id="ui-layer">

    <!-- 1. Главное меню (Состояние: Menu) -->
    <div id="main-menu" class="menu-screen active">
        <h1>SKY ACE 3D</h1>
        <p>Рекорд: <span id="menu-best-score">0</span></p>
        <button id="btn-start" class="game-btn">В ПОЛЁТ</button>
        <button id="btn-settings-menu" class="game-btn">НАСТРОЙКИ</button>
    </div>

    <!-- 2. Игровой HUD (Состояние: Playing) -->
    <div id="game-hud" class="menu-screen hidden">
        <div id="boss-warning">БОСС!</div>
        <div class="hud-top">
            <div class="hud-row">
                <span>СЧЁТ: <span id="hud-score">0</span></span>
                <span>ВЫСОТА: <span id="hud-altitude">0</span> м</span>
            </div>
            <div id="combo-container">COMBO x<span id="hud-combo">1</span></div>
            <div id="boss-hp-container">
                <div id="boss-name">БОСС: <span id="boss-name-text">BOSS</span></div>
                <div id="boss-hp-bar"></div>
            </div>
        </div>
        <div id="powerups-hud">
            <!-- Сюда будут динамически добавляться иконки -->
        </div>
        <button id="btn-pause-hud" class="icon-btn">II</button>
    </div>

    <!-- 3. Меню паузы (Состояние: Paused) -->
    <div id="pause-menu" class="menu-screen hidden">
        <h2>ПАУЗА</h2>
        <button id="btn-resume" class="game-btn">ПРОДОЛЖИТЬ</button>
        <button id="btn-settings-pause" class="game-btn">НАСТРОЙКИ</button>
        <button id="btn-quit" class="game-btn">В МЕНЮ</button>
    </div>

    <!-- 4. Экран завершения (Состояние: Game Over) -->
    <div id="game-over" class="menu-screen hidden">
        <h2>ИГРА ОКОНЧЕНА</h2>
        <p>Ваш счёт: <span id="go-score">0</span></p>
        <p>Макс. комбо: <span id="go-max-combo">0</span></p>
        <p>Сбито врагов: <span id="go-kills">0</span></p>
        <p>Сбито боссов: <span id="go-bosses">0</span></p>
        <p id="new-record-msg" class="hidden">НОВЫЙ РЕКОРД!</p>
        <button id="btn-restart" class="game-btn">ИГРАТЬ СНОВА</button>
        <button id="btn-menu-go" class="game-btn">В МЕНЮ</button>
    </div>

</div>

<div id="joystick-base">
    <div id="joystick-stick"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- 0. СОСТОЯНИЯ ИГРЫ ---
    const GameState = {
        MENU: 'Menu',
        PLAYING: 'Playing',
        PAUSED: 'Paused',
        GAMEOVER: 'Game Over'
    };

    const BossState = {
        ENTERING: 'Entering',
        ACTIVE: 'Active',
        DESTROYED: 'Destroyed',
        LEAVING: 'Leaving'
    };

    let currentState = GameState.MENU;
    let score = 0;
    let nextBossThreshold = 1000;
    let combo = 1;
    let maxCombo = 1;
    let kills = 0;
    let bossesKilled = 0;
    let gameTime = 0;
    let difficulty = 1;
    let isBossActive = false;
    let bestScore = parseInt(localStorage.getItem('skyAce_bestScore')) || 0;
    let totalKills = parseInt(localStorage.getItem('skyAce_totalKills')) || 0;
    let totalBosses = parseInt(localStorage.getItem('skyAce_totalBosses')) || 0;

    const ui = {
        mainMenu: document.getElementById('main-menu'),
        gameHud: document.getElementById('game-hud'),
        pauseMenu: document.getElementById('pause-menu'),
        gameOver: document.getElementById('game-over'),
        scoreDisplay: document.getElementById('hud-score'),
        comboDisplay: document.getElementById('hud-combo'),
        comboContainer: document.getElementById('combo-container'),
        bossHpContainer: document.getElementById('boss-hp-container'),
        bossHpBar: document.getElementById('boss-hp-bar'),
        powerupsHud: document.getElementById('powerups-hud'),
        bestScoreDisplay: document.getElementById('menu-best-score'),
        newRecordMsg: document.getElementById('new-record-msg'),
        goScore: document.getElementById('go-score'),
        goMaxCombo: document.getElementById('go-max-combo'),
        goKills: document.getElementById('go-kills'),
        goBosses: document.getElementById('go-bosses'),
        altitudeDisplay: document.getElementById('hud-altitude')
    };

    function showScreen(screenId) {
        // Скрыть все экраны UI
        [ui.mainMenu, ui.gameHud, ui.pauseMenu, ui.gameOver].forEach(el => {
            el.classList.add('hidden');
            el.classList.remove('active');
        });
        
        // Показать нужный
        const target = document.getElementById(screenId);
        if (target) {
            target.classList.remove('hidden');
            target.classList.add('active');
        }
    }

    function initGameUI() {
        ui.bestScoreDisplay.innerText = bestScore;
        setupEventListeners();
        showScreen('main-menu');
    }

    function startGame() {
        currentState = GameState.PLAYING;
        score = 0;
        combo = 1;
        maxCombo = 1;
        kills = 0;
        bossesKilled = 0;
        gameTime = 0;
        difficulty = 1;
        isBossActive = false;
        
        ui.scoreDisplay.innerText = score;
        ui.comboDisplay.innerText = combo;
        ui.bossHpContainer.style.display = 'none';
        ui.powerupsHud.innerHTML = '';
        
        // Сброс игрока и мира
        player.position.set(0, 40, 0);
        player.rotation.set(0, 0, 0);
        player.hp = 1; // 1 удар до Game Over (если нет щита)
        player.shield = 0;
        player.speedBoost = 0;
        player.multiShot = 0;
        
        // Очистка врагов, пуль и бонусов
        enemies.forEach(e => { if(e.mesh) scene.remove(e.mesh); else scene.remove(e); });
        enemies.length = 0;
        bullets.forEach(b => scene.remove(b));
        bullets.length = 0;
        enemyBullets.forEach(b => scene.remove(b));
        enemyBullets.length = 0;
        powerUps.forEach(p => scene.remove(p.mesh));
        powerUps.length = 0;
        
        showScreen('game-hud');
    }

    function pauseGame() {
        if (currentState !== GameState.PLAYING) return;
        currentState = GameState.PAUSED;
        handleInputEnd(); // Скрыть джойстик
        showScreen('pause-menu');
    }

    function resumeGame() {
        if (currentState !== GameState.PAUSED) return;
        currentState = GameState.PLAYING;
        showScreen('game-hud');
    }

    function gameOver(reason) {
        currentState = GameState.GAMEOVER;
        handleInputEnd(); // Скрыть джойстик
        
        let isNewRecord = false;
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('skyAce_bestScore', bestScore);
            isNewRecord = true;
        }
        
        totalKills += kills;
        totalBosses += bossesKilled;
        localStorage.setItem('skyAce_totalKills', totalKills);
        localStorage.setItem('skyAce_totalBosses', totalBosses);

        ui.goScore.innerText = score;
        ui.goMaxCombo.innerText = maxCombo;
        ui.goKills.innerText = kills;
        ui.goBosses.innerText = bossesKilled;
        ui.newRecordMsg.classList.toggle('hidden', !isNewRecord);
        ui.bestScoreDisplay.innerText = bestScore;
        
        showScreen('game-over');
    }

    function quitToMenu() {
        currentState = GameState.MENU;
        showScreen('main-menu');
    }

    function setupEventListeners() {
        document.getElementById('btn-start').addEventListener('click', startGame);
        document.getElementById('btn-resume').addEventListener('click', resumeGame);
        document.getElementById('btn-quit').addEventListener('click', quitToMenu);
        document.getElementById('btn-menu-go').addEventListener('click', quitToMenu);
        document.getElementById('btn-restart').addEventListener('click', startGame);
        document.getElementById('btn-pause-hud').addEventListener('click', pauseGame);

        // Кнопки настроек (пока заглушки или звук)
        const toggleSettings = () => {
            if (!AudioController.ctx) AudioController.init();
            AudioController.enabled = !AudioController.enabled;
            alert(AudioController.enabled ? "Звук включен" : "Звук выключен");
        };
        document.getElementById('btn-settings-menu').addEventListener('click', toggleSettings);
        document.getElementById('btn-settings-pause').addEventListener('click', toggleSettings);

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (currentState === GameState.PLAYING) pauseGame();
                else if (currentState === GameState.PAUSED) resumeGame();
            }
        });
    }

    // --- 1. АУДИО КОНТРОЛЛЕР ---
    const AudioController = {
        ctx: null,
        enabled: false,
        init() {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.enabled = true;
        },
        playTone(freq, type, duration, vol) {
            if (!this.enabled || !this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        playShot() { this.playTone(440, 'square', 0.1, 0.1); },
        playEnemyShot() { this.playTone(220, 'square', 0.1, 0.05); },
        playExplosion() { this.playTone(100, 'sawtooth', 0.5, 0.2); },
        playPowerUp() { this.playTone(880, 'sine', 0.2, 0.1); },
        playHit() { this.playTone(150, 'square', 0.1, 0.2); }
    };

    function toggleSound() {
        if (!AudioController.ctx) AudioController.init();
        AudioController.enabled = !AudioController.enabled;
    }

    // --- 2. ГЕОМЕТРИИ И МАТЕРИАЛЫ ---
    const Geoms = {
        drone: new THREE.BoxGeometry(3, 0.5, 2),
        kamikaze: new THREE.BoxGeometry(2, 2, 4),
        shooter: new THREE.BoxGeometry(4, 1.5, 4),
        boss: new THREE.BoxGeometry(12, 5, 8),
        bullet: new THREE.SphereGeometry(0.3, 8, 8),
        enemyBullet: new THREE.SphereGeometry(0.4, 8, 8),
        powerUp: new THREE.OctahedronGeometry(1.5)
    };
    const Mats = {
        drone: new THREE.MeshPhongMaterial({ color: 0xe67e22, flatShading: true }),
        kamikaze: new THREE.MeshPhongMaterial({ color: 0xc0392b, flatShading: true }),
        shooter: new THREE.MeshPhongMaterial({ color: 0x8e44ad, flatShading: true }),
        boss: new THREE.MeshPhongMaterial({ color: 0x2c3e50, flatShading: true }),
        bullet: new THREE.MeshBasicMaterial({ color: 0xffff00 }),
        enemyBullet: new THREE.MeshBasicMaterial({ color: 0xff0000 }),
        shield: new THREE.MeshPhongMaterial({ color: 0x3498db, transparent: true, opacity: 0.5 }),
        speed: new THREE.MeshPhongMaterial({ color: 0x2ecc71, flatShading: true }),
        multishot: new THREE.MeshPhongMaterial({ color: 0xf1c40f, flatShading: true })
    };

    // --- 3. НАСТРОЙКА СЦЕНЫ ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x87CEEB, 50, 250);
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- 4. СВЕТ ---
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 50, 10);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // --- 5. МИР (ЗЕМЛЯ И ОБЛАКА) ---
    const groundGeom = new THREE.PlaneGeometry(100, 2000);
    const groundMat = new THREE.MeshPhongMaterial({ color: 0x3b7d3b, flatShading: true });
    const ground = new THREE.Mesh(groundGeom, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -20;
    ground.receiveShadow = true;
    scene.add(ground);

    const clouds = [];
    function createCloud(x, y, z) {
        const cloudGroup = new THREE.Group();
        const cloudGeom = new THREE.DodecahedronGeometry(Math.random() * 2 + 1, 0);
        const cloudMat = new THREE.MeshPhongMaterial({ color: 0xffffff, flatShading: true, transparent: true, opacity: 0.8 });
        for (let i = 0; i < 4; i++) {
            const m = new THREE.Mesh(cloudGeom, cloudMat);
            m.position.set(Math.random()*4-2, Math.random()*2-1, Math.random()*4-2);
            cloudGroup.add(m);
        }
        cloudGroup.position.set(x, y, z);
        scene.add(cloudGroup);
        clouds.push(cloudGroup);
    }
    for (let i = 0; i < 40; i++) {
        createCloud((Math.random()-0.5)*100, 30+Math.random()*30, -Math.random()*600);
    }

    // --- 6. САМОЛЕТ (ИГРОК) ---
    function createPlane() {
        const group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 4), new THREE.MeshPhongMaterial({ color: 0x3498db, flatShading: true }));
        body.castShadow = true;
        group.add(body);
        const wings = new THREE.Mesh(new THREE.BoxGeometry(7, 0.2, 1.5), new THREE.MeshPhongMaterial({ color: 0x2980b9, flatShading: true }));
        wings.position.z = 0.5;
        wings.castShadow = true;
        group.add(wings);
        const prop = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.2, 0.2), new THREE.MeshPhongMaterial({ color: 0x333333 }));
        prop.position.z = -2.1;
        group.add(prop);

        // Щит (визуальный эффект)
        const shieldMesh = new THREE.Mesh(new THREE.SphereGeometry(4, 16, 16), Mats.shield);
        shieldMesh.visible = false;
        group.add(shieldMesh);

        return { mesh: group, prop: prop, shieldMesh: shieldMesh };
    }
    const playerObj = createPlane();
    const player = playerObj.mesh;
    player.hp = 1;
    player.shield = 0;
    player.speedBoost = 0;
    player.multiShot = 0;
    player.position.y = 40;
    scene.add(player);

    // --- 7. КОНТРОЛЛЕР УПРАВЛЕНИЯ ---
    const input = { x: 0, y: 0, intensity: 0 };
    const joyBase = document.getElementById('joystick-base');
    const joyStick = document.getElementById('joystick-stick');
    const joyRadius = 50;
    let startPos = { x: 0, y: 0 };

    function handleInputStart(x, y) {
        if (currentState !== GameState.PLAYING) return;
        if (!AudioController.ctx) AudioController.init();
        startPos = { x, y };
        joyBase.style.display = 'block';
        joyBase.style.left = (x - joyRadius) + 'px';
        joyBase.style.top = (y - joyRadius) + 'px';
    }

    function handleInputMove(x, y) {
        if (currentState !== GameState.PLAYING) return;
        const dx = x - startPos.x;
        const dy = y - startPos.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const angle = Math.atan2(dy, dx);
        
        const moveDist = Math.min(dist, joyRadius);
        input.intensity = moveDist / joyRadius;
        input.x = (moveDist * Math.cos(angle)) / joyRadius;
        input.y = (moveDist * Math.sin(angle)) / joyRadius;

        joyStick.style.left = (25 + input.x * joyRadius/2) + 'px';
        joyStick.style.top = (25 + input.y * joyRadius/2) + 'px';
    }

    function handleInputEnd() {
        joyBase.style.display = 'none';
        input.x = 0; input.y = 0; input.intensity = 0;
    }

    window.addEventListener('touchstart', e => handleInputStart(e.touches[0].clientX, e.touches[0].clientY), {passive:false});
    window.addEventListener('touchmove', e => { e.preventDefault(); handleInputMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
    window.addEventListener('touchend', handleInputEnd);

    window.addEventListener('mousedown', e => handleInputStart(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => { if(joyBase.style.display === 'block') handleInputMove(e.clientX, e.clientY); });
    window.addEventListener('mouseup', handleInputEnd);

    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // --- 8. ГЕЙМПЛЕЙНЫЕ КЛАССЫ ---
    class Enemy {
        constructor(type) {
            this.type = type;
            this.mesh = new THREE.Mesh(Geoms[type], Mats[type]);
            this.mesh.castShadow = true;
            this.hp = type === 'boss' ? (50 + bossesKilled * 30) : (type === 'shooter' ? 3 : 1);
            this.maxHp = this.hp;
            this.speed = type === 'kamikaze' ? 40 : 15;
            this.fireTimer = 0;
            this.sinOffset = Math.random() * Math.PI * 2;
            this.isDead = false;
            this.state = type === 'boss' ? BossState.ENTERING : 'Active';
            this.attackPattern = 0;
            this.moveTimer = 0;
        }
        update(dt) {
            if (this.isDead) return;
            
            if (this.type === 'boss') {
                this.updateBoss(dt);
                return;
            }

            if (this.type === 'drone') {
                this.mesh.position.z += this.speed * dt;
                this.mesh.position.x += Math.sin(gameTime * 2 + this.sinOffset) * 10 * dt;
            } else if (this.type === 'kamikaze') {
                const dx = player.position.x - this.mesh.position.x;
                const dy = player.position.y - this.mesh.position.y;
                this.mesh.position.x += dx * 0.5 * dt;
                this.mesh.position.y += dy * 0.5 * dt;
                this.mesh.position.z += this.speed * dt;
                this.mesh.lookAt(player.position);
            } else if (this.type === 'shooter') {
                this.mesh.position.z += this.speed * 0.5 * dt;
                this.fireTimer += dt;
                if (this.fireTimer > 2.0 / difficulty) {
                    this.shoot();
                    this.fireTimer = 0;
                }
            }
        }
        updateBoss(dt) {
            if (this.state === BossState.ENTERING) {
                // Плавное вхождение: босс стремится к позиции впереди игрока
                const targetZ = player.position.z - 70;
                const targetY = 30;
                this.mesh.position.z += (targetZ - this.mesh.position.z) * 1.5 * dt;
                this.mesh.position.y += (targetY - this.mesh.position.y) * dt;
                
                if (Math.abs(this.mesh.position.z - targetZ) < 5) {
                    this.state = BossState.ACTIVE;
                    document.getElementById('boss-warning').style.display = 'none';
                }
            } 
            else if (this.state === BossState.ACTIVE) {
                // Сохранение дистанции от игрока
                this.mesh.position.z = player.position.z - 70;
                // Патрулирование влево-вправо
                this.mesh.position.x = Math.sin(gameTime * 0.5) * 25;
                
                this.fireTimer += dt;
                this.moveTimer += dt;

                // Основная атака (пулемет)
                if (this.fireTimer > 0.5) {
                    this.shoot();
                    this.fireTimer = 0;
                }

                // Спецаттака (веер) каждые 5 сек
                if (this.moveTimer > 5.0) {
                    this.shootBossVeer();
                    this.moveTimer = 0;
                }
            }
            else if (this.state === BossState.LEAVING) {
                this.mesh.position.z -= 100 * dt;
                this.mesh.position.y += 50 * dt;
            }
        }
        shoot() {
            const b = new THREE.Mesh(Geoms.enemyBullet, Mats.enemyBullet);
            b.position.copy(this.mesh.position);
            // Направление к игроку
            const dir = new THREE.Vector3().subVectors(player.position, this.mesh.position).normalize();
            b.userData = { vx: dir.x * 60, vy: dir.y * 60, vz: dir.z * 60 };
            scene.add(b);
            enemyBullets.push(b);
            AudioController.playEnemyShot();
        }
        shootBossVeer() {
            for (let i = -2; i <= 2; i++) {
                const b = new THREE.Mesh(Geoms.enemyBullet, Mats.enemyBullet);
                b.position.copy(this.mesh.position);
                b.userData = { vx: i * 15, vy: -5, vz: 80 };
                scene.add(b);
                enemyBullets.push(b);
            }
            AudioController.playEnemyShot();
        }
        takeDamage(dmg) {
            this.hp -= dmg;
            if (this.hp <= 0 && !this.isDead) {
                this.die();
                return true;
            }
            return false;
        }
        die() {
            this.isDead = true;
            this.state = BossState.DESTROYED;
            AudioController.playExplosion();
            
            // Тряска экрана (заглушка: смещаем камеру на мгновение)
            shakeScreen();
            
            kills++;
            let points = this.type === 'boss' ? 1000 : (this.type === 'shooter' ? 50 : 20);
            updateScore(points * combo);
            updateCombo(true);
            
            if (this.type === 'boss') {
                isBossActive = false;
                bossesKilled++;
                nextBossThreshold += 1000;
                ui.bossHpContainer.style.display = 'none';
                spawnPowerUp(this.mesh.position.clone(), true); // Гарантированный бонус
            } else if (Math.random() < 0.15) {
                spawnPowerUp(this.mesh.position.clone());
            }
            scene.remove(this.mesh);
        }
    }

    class PowerUp {
        constructor(pos) {
            const types = ['shield', 'speed', 'multishot'];
            this.type = types[Math.floor(Math.random() * types.length)];
            this.mesh = new THREE.Mesh(Geoms.powerUp, Mats[this.type]);
            this.mesh.position.copy(pos);
            scene.add(this.mesh);
        }
        update(dt) {
            this.mesh.position.z += 10 * dt;
            this.mesh.rotation.y += 2 * dt;
        }
    }

    // --- 9. ГЕЙМПЛЕЙНЫЕ ФУНКЦИИ ---
    const bullets = [];
    const enemyBullets = [];
    const enemies = [];
    const powerUps = [];
    let lastTime = performance.now();
    let spawnTimer = 0;
    let fireTimer = 0;

    const CEILING = 60, FLOOR = 0, LIMIT_X = 30;

    function startGame() {
        currentState = GameState.PLAYING;
        score = 0;
        nextBossThreshold = 1000;
        combo = 1;
        maxCombo = 1;
        kills = 0;
        bossesKilled = 0;
        gameTime = 0;
        difficulty = 1;
        isBossActive = false;
        
        ui.scoreDisplay.innerText = score;
        ui.comboDisplay.innerText = combo;
        ui.bossHpContainer.style.display = 'none';
        document.getElementById('boss-warning').style.display = 'none';
        ui.powerupsHud.innerHTML = '';
        
        // Сброс игрока и мира
        player.position.set(0, 40, 0);
        player.rotation.set(0, 0, 0);
        player.hp = 1; 
        player.shield = 0;
        player.speedBoost = 0;
        player.multiShot = 0;
        
        // Очистка
        enemies.forEach(e => { if(e.mesh) scene.remove(e.mesh); else scene.remove(e); });
        enemies.length = 0;
        bullets.forEach(b => scene.remove(b));
        bullets.length = 0;
        enemyBullets.forEach(b => scene.remove(b));
        enemyBullets.length = 0;
        powerUps.forEach(p => scene.remove(p.mesh));
        powerUps.length = 0;
        
        showScreen('game-hud');
    }

    function gameOver(reason) {
        if (currentState === GameState.GAMEOVER) return;
        currentState = GameState.GAMEOVER;
        
        // Босс улетает, если игрок погиб
        enemies.forEach(e => {
            if (e.type === 'boss') e.state = BossState.LEAVING;
        });

        handleInputEnd(); 
        
        let isNewRecord = false;
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('skyAce_bestScore', bestScore);
            isNewRecord = true;
        }
        
        totalKills += kills;
        totalBosses += bossesKilled;
        localStorage.setItem('skyAce_totalKills', totalKills);
        localStorage.setItem('skyAce_totalBosses', totalBosses);

        ui.goScore.innerText = score;
        ui.goMaxCombo.innerText = maxCombo;
        ui.goKills.innerText = kills;
        ui.goBosses.innerText = bossesKilled;
        ui.newRecordMsg.classList.toggle('hidden', !isNewRecord);
        ui.bestScoreDisplay.innerText = bestScore;
        
        showScreen('game-over');
    }

    // Тряска экрана
    let shakeIntensity = 0;
    function shakeScreen() {
        shakeIntensity = 2.0;
    }

    function spawnEnemy() {
        if (isBossActive) return;
        
        // Проверка на появление босса
        if (score >= nextBossThreshold) {
            spawnBoss();
            return;
        }

        let type = 'drone';
        const rand = Math.random();
        if (score > 1000 && rand < 0.2) type = 'shooter';
        else if (score > 500 && rand < 0.4) type = 'kamikaze';
        
        const enemy = new Enemy(type);
        enemy.mesh.position.set((Math.random()-0.5)*60, 10+Math.random()*40, player.position.z - 200);
        scene.add(enemy.mesh);
        enemies.push(enemy);
    }

    function spawnBoss() {
        isBossActive = true;
        document.getElementById('boss-warning').style.display = 'block';
        
        const boss = new Enemy('boss');
        boss.mesh.position.set(0, 30, player.position.z - 150);
        scene.add(boss.mesh);
        enemies.push(boss);
        
        ui.bossHpContainer.style.display = 'block';
        ui.bossHpBar.style.width = '100%';
        document.getElementById('boss-name-text').innerText = "GENERAL " + (bossesKilled + 1);
    }

    function spawnPowerUp(pos, guaranteed = false) {
        if (guaranteed || Math.random() < 0.15) {
            powerUps.push(new PowerUp(pos));
        }
    }

    function shoot() {
        const createBullet = (offsetX = 0) => {
            const b = new THREE.Mesh(Geoms.bullet, Mats.bullet);
            b.position.copy(player.position);
            b.position.x += offsetX;
            b.position.z -= 2;
            scene.add(b);
            bullets.push(b);
        };

        createBullet(0);
        if (player.multiShot > 0) {
            createBullet(-2);
            createBullet(2);
        }
        AudioController.playShot();
    }

    function updateScore(pts) {
        score += pts;
        ui.scoreDisplay.innerText = score;
    }

    function updateCombo(hit) {
        if (hit) {
            combo = Math.min(10, combo + 0.1);
            ui.comboContainer.classList.add('combo-active');
            setTimeout(() => ui.comboContainer.classList.remove('combo-active'), 100);
        } else {
            combo = 1;
        }
        maxCombo = Math.max(maxCombo, Math.floor(combo));
        ui.comboDisplay.innerText = combo.toFixed(1);
    }

    function spawnPowerUpHUD(type, duration) {
        const id = 'pu-' + type;
        let el = document.getElementById(id);
        if (!el) {
            el = document.createElement('div');
            el.id = id;
            el.className = 'powerup-icon ' + type;
            ui.powerupsHud.appendChild(el);
        }
        el.innerHTML = `<span>${type.toUpperCase()}</span><span id="${id}-time">${Math.ceil(duration)}s</span>`;
    }

    function update(dt) {
        if (currentState !== GameState.PLAYING) return;
        gameTime += dt;
        difficulty = 1 + score / 5000;

        // Тряска
        let shakeX = 0, shakeY = 0;
        if (shakeIntensity > 0) {
            shakeX = (Math.random() - 0.5) * shakeIntensity;
            shakeY = (Math.random() - 0.5) * shakeIntensity;
            shakeIntensity -= dt * 5.0;
        }

        // Ввод
        let kX = 0, kY = 0;
        if (keys['ArrowLeft']) kX = -1;
        if (keys['ArrowRight']) kX = 1;
        if (keys['ArrowUp']) kY = -1;
        if (keys['ArrowDown']) kY = 1;

        const pSpeed = 40 * (player.speedBoost > 0 ? 1.5 : 1.0);
        const moveX = (input.x || kX) * pSpeed * dt;
        const moveY = -(input.y || kY) * pSpeed * dt;

        player.position.x += moveX;
        player.position.y += moveY;
        player.position.z -= 60 * dt;

        player.position.x = Math.max(-LIMIT_X, Math.min(LIMIT_X, player.position.x));
        player.position.y = Math.max(FLOOR, Math.min(CEILING, player.position.y));
        player.rotation.z = -moveX * 0.5;
        player.rotation.x = moveY * 0.5;
        playerObj.prop.rotation.z += 1.5;
        playerObj.shieldMesh.visible = player.shield > 0;

        // Таймеры бонусов
        if (player.speedBoost > 0) {
            player.speedBoost -= dt;
            spawnPowerUpHUD('speed', player.speedBoost);
            if (player.speedBoost <= 0) document.getElementById('pu-speed')?.remove();
        }
        if (player.multiShot > 0) {
            player.multiShot -= dt;
            spawnPowerUpHUD('multishot', player.multiShot);
            if (player.multiShot <= 0) document.getElementById('pu-multishot')?.remove();
        }

        camera.position.z = player.position.z + 20;
        camera.position.x += (player.position.x - camera.position.x) * 0.1 + shakeX;
        camera.position.y += (player.position.y + 6 - camera.position.y) * 0.1 + shakeY;
        camera.lookAt(player.position.x, player.position.y, player.position.z - 15);

        ui.altitudeDisplay.innerText = Math.round(player.position.y);

        fireTimer += dt;
        if (fireTimer > 0.15) { shoot(); fireTimer = 0; }

        // Пули игрока
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].position.z -= 200 * dt;
            if (bullets[i].position.z < player.position.z - 200) {
                scene.remove(bullets[i]);
                bullets.splice(i, 1);
            }
        }

        // Пули врагов
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            const eb = enemyBullets[i];
            eb.position.z += 80 * dt;
            if (eb.userData.vx) {
                eb.position.x += eb.userData.vx * dt;
                eb.position.y += eb.userData.vy * dt;
                eb.position.z += (eb.userData.vz || 0) * dt;
            }
            
            if (eb.position.distanceTo(player.position) < 3) {
                if (player.shield > 0) {
                    player.shield--;
                    AudioController.playHit();
                    if (player.shield <= 0) document.getElementById('pu-shield')?.remove();
                } else {
                    gameOver('Сбит вражеским огнем!');
                }
                scene.remove(eb);
                enemyBullets.splice(i, 1);
                updateCombo(false);
                continue;
            }

            if (eb.position.z > player.position.z + 20) {
                scene.remove(eb);
                enemyBullets.splice(i, 1);
            }
        }

        // Враги
        spawnTimer += dt;
        if (spawnTimer > Math.max(0.3, 1.5 / difficulty)) { spawnEnemy(); spawnTimer = 0; }

        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            e.update(dt);

            if (e.type === 'boss') {
                ui.bossHpBar.style.width = (e.hp / e.maxHp * 100) + '%';
            }

            for (let j = bullets.length - 1; j >= 0; j--) {
                if (bullets[j].position.distanceTo(e.mesh.position) < 4) {
                    scene.remove(bullets[j]);
                    bullets.splice(j, 1);
                    if (e.takeDamage(1)) {
                        enemies.splice(i, 1);
                    }
                    break;
                }
            }

            if (!e.isDead && player.position.distanceTo(e.mesh.position) < 4) {
                if (player.shield > 0) {
                    player.shield--;
                    e.die();
                    enemies.splice(i, 1);
                    AudioController.playHit();
                    if (player.shield <= 0) document.getElementById('pu-shield')?.remove();
                } else {
                    gameOver('Столкновение!');
                }
            }

            if (!e.isDead && e.mesh.position.z > player.position.z + 20) {
                scene.remove(e.mesh);
                enemies.splice(i, 1);
                if (e.type !== 'boss') updateCombo(false);
            }
        }

        // Бонусы
        for (let i = powerUps.length - 1; i >= 0; i--) {
            const p = powerUps[i];
            p.update(dt);
            if (player.position.distanceTo(p.mesh.position) < 4) {
                if (p.type === 'shield') { player.shield = 1; spawnPowerUpHUD('shield', 999); }
                else if (p.type === 'speed') player.speedBoost = 10;
                else if (p.type === 'multishot') player.multiShot = 10;
                
                AudioController.playPowerUp();
                scene.remove(p.mesh);
                powerUps.splice(i, 1);
            } else if (p.mesh.position.z > player.position.z + 20) {
                scene.remove(p.mesh);
                powerUps.splice(i, 1);
            }
        }

        ground.position.z = player.position.z;
        clouds.forEach(c => {
            if (c.position.z > player.position.z + 50) {
                c.position.z = player.position.z - 500 - Math.random() * 100;
            }
        });
    }

    function checkOrientation() {
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isLandscape = window.innerWidth > window.innerHeight;
        document.getElementById('orientation-overlay').style.display = (isMobile && isLandscape) ? 'flex' : 'none';
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        checkOrientation();
    });

    function animate() {
        const now = performance.now();
        const dt = (now - lastTime) / 1000;
        lastTime = now;
        update(dt);
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }

    checkOrientation();
    initGameUI();
    animate();
</script>
</body>
</html>
