<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKY ACE 3D: Arcade Shooter</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Arial', sans-serif; 
            background-color: #87CEEB; 
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }
        .score-container {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
        }
        #best-score {
            font-size: 16px;
            opacity: 0.8;
        }
        #altitude-board {
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px #000;
            text-align: right;
        }
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 32px;
            text-align: center;
            text-shadow: 2px 2px 4px #000;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            z-index: 20;
            width: 80%;
            max-width: 400px;
            pointer-events: auto;
        }
        #orientation-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #2c3e50;
            color: white;
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .phone-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: rotate 2s infinite ease-in-out;
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
            100% { transform: rotate(0deg); }
        }
        button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            min-width: 200px;
        }
        button:active { transform: scale(0.95); }
        
        #joystick-base {
            position: absolute;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: none;
            z-index: 5;
            pointer-events: none;
        }
        #joystick-stick {
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            top: 25px;
            left: 25px;
        }
        /* Базовые стили для экранов */
        .menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            z-index: 10;
        }

        /* Классы видимости */
        .hidden {
            display: none !important;
        }
        .active {
            display: flex !important;
        }

        /* Кнопки (Удобно для пальца) */
        .game-btn {
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            font-weight: bold;
            min-width: 200px;
            min-height: 50px; /* Минимум 44px для тач-интерфейсов */
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .game-btn:active { transform: scale(0.95); }

        /* HUD в игре */
        #game-hud {
            background: transparent;
            justify-content: space-between;
            pointer-events: none; /* Чтобы клики проходили сквозь пустые места */
        }
        .hud-top {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            pointer-events: auto;
            display: flex;
            justify-content: space-between;
            width: 100%;
            box-sizing: border-box;
        }
        .icon-btn {
            pointer-events: auto;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            font-size: 24px;
            border-radius: 50%;
            margin: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div id="orientation-overlay">
    <div class="phone-icon">📱</div>
    <h2>Пожалуйста, поверните устройство</h2>
    <p>Игра работает лучше всего в портретном (вертикальном) режиме.</p>
</div>

<!-- Контейнер интерфейса -->
<div id="ui-layer">

    <!-- 1. Главное меню (Состояние: Menu) -->
    <div id="main-menu" class="menu-screen active">
        <h1>SKY ACE 3D</h1>
        <p>Рекорд: <span id="menu-best-score">0</span></p>
        <button id="btn-start" class="game-btn">В ПОЛЁТ</button>
        <button id="btn-settings-menu" class="game-btn">НАСТРОЙКИ</button>
    </div>

    <!-- 2. Игровой HUD (Состояние: Playing) -->
    <div id="game-hud" class="menu-screen hidden">
        <div class="hud-top">
            <span>Счёт: <span id="hud-score">0</span></span>
            <span>Высота: <span id="hud-altitude">0</span> м</span>
        </div>
        <!-- Кнопка паузы для мобильных (на ПК можно скрыть или оставить) -->
        <button id="btn-pause-hud" class="icon-btn">II</button>
    </div>

    <!-- 3. Меню паузы (Состояние: Paused) -->
    <div id="pause-menu" class="menu-screen hidden">
        <h2>ПАУЗА</h2>
        <button id="btn-resume" class="game-btn">ПРОДОЛЖИТЬ</button>
        <button id="btn-settings-pause" class="game-btn">НАСТРОЙКИ</button>
        <button id="btn-quit" class="game-btn">В МЕНЮ</button>
    </div>

    <!-- 4. Экран завершения (Состояние: Game Over) -->
    <div id="game-over" class="menu-screen hidden">
        <h2>ИГРА ОКОНЧЕНА</h2>
        <p>Ваш счёт: <span id="go-score">0</span></p>
        <p id="new-record-msg" class="hidden">НОВЫЙ РЕКОРД!</p>
        <button id="btn-restart" class="game-btn">ИГРАТЬ СНОВА</button>
        <button id="btn-menu-go" class="game-btn">В МЕНЮ</button>
    </div>

</div>

<div id="joystick-base">
    <div id="joystick-stick"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- 0. СОСТОЯНИЯ ИГРЫ ---
    const GameState = {
        MENU: 'Menu',
        PLAYING: 'Playing',
        PAUSED: 'Paused',
        GAMEOVER: 'Game Over'
    };

    let currentState = GameState.MENU;
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('skyAce_bestScore')) || 0;

    const ui = {
        mainMenu: document.getElementById('main-menu'),
        gameHud: document.getElementById('game-hud'),
        pauseMenu: document.getElementById('pause-menu'),
        gameOver: document.getElementById('game-over'),
        scoreDisplay: document.getElementById('hud-score'),
        bestScoreDisplay: document.getElementById('menu-best-score'),
        newRecordMsg: document.getElementById('new-record-msg'),
        goScore: document.getElementById('go-score'),
        altitudeDisplay: document.getElementById('hud-altitude')
    };

    function showScreen(screenId) {
        // Скрыть все экраны UI
        ui.mainMenu.classList.add('hidden');
        ui.gameHud.classList.add('hidden');
        ui.pauseMenu.classList.add('hidden');
        ui.gameOver.classList.add('hidden');
        
        // Показать нужный
        const target = document.getElementById(screenId);
        if (target) {
            target.classList.remove('hidden');
            target.classList.add('active');
        }
    }

    function initGameUI() {
        ui.bestScoreDisplay.innerText = bestScore;
        setupEventListeners();
        showScreen('main-menu');
    }

    function startGame() {
        currentState = GameState.PLAYING;
        score = 0;
        ui.scoreDisplay.innerText = score;
        
        // Сброс игрока и мира
        player.position.set(0, 40, 0);
        player.rotation.set(0, 0, 0);
        
        // Очистка врагов и пуль
        enemies.forEach(e => scene.remove(e));
        enemies.length = 0;
        bullets.forEach(b => scene.remove(b));
        bullets.length = 0;
        
        showScreen('game-hud');
    }

    function pauseGame() {
        if (currentState !== GameState.PLAYING) return;
        currentState = GameState.PAUSED;
        showScreen('pause-menu');
    }

    function resumeGame() {
        if (currentState !== GameState.PAUSED) return;
        currentState = GameState.PLAYING;
        showScreen('game-hud');
    }

    function gameOver(reason) {
        currentState = GameState.GAMEOVER;
        
        let isNewRecord = false;
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('skyAce_bestScore', bestScore);
            isNewRecord = true;
        }

        ui.goScore.innerText = score;
        ui.newRecordMsg.classList.toggle('hidden', !isNewRecord);
        ui.bestScoreDisplay.innerText = bestScore;
        
        showScreen('game-over');
    }

    function quitToMenu() {
        currentState = GameState.MENU;
        showScreen('main-menu');
    }

    function setupEventListeners() {
        document.getElementById('btn-start').addEventListener('click', startGame);
        document.getElementById('btn-resume').addEventListener('click', resumeGame);
        document.getElementById('btn-quit').addEventListener('click', quitToMenu);
        document.getElementById('btn-menu-go').addEventListener('click', quitToMenu);
        document.getElementById('btn-restart').addEventListener('click', startGame);
        document.getElementById('btn-pause-hud').addEventListener('click', pauseGame);

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (currentState === GameState.PLAYING) pauseGame();
                else if (currentState === GameState.PAUSED) resumeGame();
            }
        });
    }

    // --- 1. АУДИО КОНТРОЛЛЕР ---
    const AudioController = {
        ctx: null,
        enabled: false,
        init() {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.enabled = true;
        },
        playTone(freq, type, duration, vol) {
            if (!this.enabled || !this.ctx) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        playShot() { this.playTone(440, 'square', 0.1, 0.1); },
        playExplosion() { this.playTone(100, 'sawtooth', 0.5, 0.2); },
        playPowerUp() { this.playTone(880, 'sine', 0.2, 0.1); }
    };

    function toggleSound() {
        if (!AudioController.ctx) AudioController.init();
        AudioController.enabled = !AudioController.enabled;
        document.querySelector('.settings-btn').innerText = AudioController.enabled ? '🔊' : '🔇';
    }

    // --- 2. НАСТРОЙКА СЦЕНЫ ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x87CEEB, 50, 250);
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Оптимизация
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- 3. СВЕТ ---
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 50, 10);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // --- 4. МИР (ЗЕМЛЯ И ОБЛАКА) ---
    const groundGeom = new THREE.PlaneGeometry(100, 2000);
    const groundMat = new THREE.MeshPhongMaterial({ color: 0x3b7d3b, flatShading: true });
    const ground = new THREE.Mesh(groundGeom, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -20;
    ground.receiveShadow = true;
    scene.add(ground);

    const clouds = [];
    function createCloud(x, y, z) {
        const cloudGroup = new THREE.Group();
        const cloudGeom = new THREE.DodecahedronGeometry(Math.random() * 2 + 1, 0);
        const cloudMat = new THREE.MeshPhongMaterial({ color: 0xffffff, flatShading: true, transparent: true, opacity: 0.8 });
        for (let i = 0; i < 4; i++) {
            const m = new THREE.Mesh(cloudGeom, cloudMat);
            m.position.set(Math.random()*4-2, Math.random()*2-1, Math.random()*4-2);
            cloudGroup.add(m);
        }
        cloudGroup.position.set(x, y, z);
        scene.add(cloudGroup);
        clouds.push(cloudGroup);
    }
    for (let i = 0; i < 40; i++) {
        createCloud((Math.random()-0.5)*100, 30+Math.random()*30, -Math.random()*600);
    }

    // --- 5. САМОЛЕТ (ИГРОК) ---
    function createPlane() {
        const group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 4), new THREE.MeshPhongMaterial({ color: 0x3498db, flatShading: true }));
        body.castShadow = true;
        group.add(body);
        const wings = new THREE.Mesh(new THREE.BoxGeometry(7, 0.2, 1.5), new THREE.MeshPhongMaterial({ color: 0x2980b9, flatShading: true }));
        wings.position.z = 0.5;
        wings.castShadow = true;
        group.add(wings);
        const prop = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.2, 0.2), new THREE.MeshPhongMaterial({ color: 0x333333 }));
        prop.position.z = -2.1;
        group.add(prop);
        return { mesh: group, prop: prop };
    }
    const playerObj = createPlane();
    const player = playerObj.mesh;
    player.position.y = 40;
    scene.add(player);

    // --- 6. КОНТРОЛЛЕР УПРАВЛЕНИЯ ---
    const input = { x: 0, y: 0, intensity: 0 };
    const joyBase = document.getElementById('joystick-base');
    const joyStick = document.getElementById('joystick-stick');
    const joyRadius = 50;
    let startPos = { x: 0, y: 0 };

    function handleInputStart(x, y) {
        if (currentState !== GameState.PLAYING) return;
        if (!AudioController.ctx) AudioController.init();
        startPos = { x, y };
        joyBase.style.display = 'block';
        joyBase.style.left = (x - joyRadius) + 'px';
        joyBase.style.top = (y - joyRadius) + 'px';
    }

    function handleInputMove(x, y) {
        if (currentState !== GameState.PLAYING) return;
        const dx = x - startPos.x;
        const dy = y - startPos.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const angle = Math.atan2(dy, dx);
        
        const moveDist = Math.min(dist, joyRadius);
        input.intensity = moveDist / joyRadius;
        input.x = (moveDist * Math.cos(angle)) / joyRadius;
        input.y = (moveDist * Math.sin(angle)) / joyRadius;

        joyStick.style.left = (25 + input.x * joyRadius/2) + 'px';
        joyStick.style.top = (25 + input.y * joyRadius/2) + 'px';
    }

    function handleInputEnd() {
        joyBase.style.display = 'none';
        input.x = 0; input.y = 0; input.intensity = 0;
    }

    window.addEventListener('touchstart', e => handleInputStart(e.touches[0].clientX, e.touches[0].clientY), {passive:false});
    window.addEventListener('touchmove', e => { e.preventDefault(); handleInputMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
    window.addEventListener('touchend', handleInputEnd);

    window.addEventListener('mousedown', e => handleInputStart(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => { if(joyBase.style.display === 'block') handleInputMove(e.clientX, e.clientY); });
    window.addEventListener('mouseup', handleInputEnd);

    // Резервное управление клавиатурой
    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // --- 7. ГЕЙМПЛЕЙ ---
    const bullets = [];
    const enemies = [];
    let lastTime = performance.now();
    let spawnTimer = 0;
    let fireTimer = 0;

    const CEILING = 60, FLOOR = 0, LIMIT_X = 30;

    function spawnEnemy() {
        const enemy = new THREE.Mesh(
            new THREE.BoxGeometry(4, 4, 4),
            new THREE.MeshPhongMaterial({ color: 0xe74c3c, flatShading: true })
        );
        enemy.position.set((Math.random()-0.5)*50, 10+Math.random()*40, player.position.z - 150);
        scene.add(enemy);
        enemies.push(enemy);
    }

    function shoot() {
        const b = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({ color: 0xfff200 }));
        b.position.copy(player.position);
        b.position.z -= 2;
        scene.add(b);
        bullets.push(b);
        AudioController.playShot();
    }

    function update(dt) {
        if (currentState !== GameState.PLAYING) return;

        // Ввод (стик или клавиатура)
        let kX = 0, kY = 0;
        if (keys['ArrowLeft']) kX = -1;
        if (keys['ArrowRight']) kX = 1;
        if (keys['ArrowUp']) kY = -1;
        if (keys['ArrowDown']) kY = 1;

        const moveX = (input.x || kX) * 40 * dt;
        const moveY = -(input.y || kY) * 40 * dt; // Инверсия Y для авиа-стиля

        player.position.x += moveX;
        player.position.y += moveY;
        player.position.z -= 50 * dt; // Полет вперед

        // Ограничения
        player.position.x = Math.max(-LIMIT_X, Math.min(LIMIT_X, player.position.x));
        player.position.y = Math.max(FLOOR, Math.min(CEILING, player.position.y));

        // Наклоны
        player.rotation.z = -moveX * 0.5;
        player.rotation.x = moveY * 0.5;
        playerObj.prop.rotation.z += 1.0;

        // Камера
        camera.position.z = player.position.z + 20;
        camera.position.x += (player.position.x - camera.position.x) * 0.1;
        camera.position.y += (player.position.y + 5 - camera.position.y) * 0.1;
        camera.lookAt(player.position.x, player.position.y, player.position.z - 10);

        // HUD
        ui.altitudeDisplay.innerText = Math.round(player.position.y);

        // Стрельба
        fireTimer += dt;
        if (fireTimer > 0.15) { shoot(); fireTimer = 0; }

        // Пули
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].position.z -= 150 * dt;
            if (bullets[i].position.z < player.position.z - 150) {
                scene.remove(bullets[i]);
                bullets.splice(i, 1);
            }
        }

        // Враги
        spawnTimer += dt;
        if (spawnTimer > 1.0) { spawnEnemy(); spawnTimer = 0; }

        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            e.position.z += 10 * dt;
            e.rotation.y += dt;

            // Коллизия с пулей
            for (let j = bullets.length - 1; j >= 0; j--) {
                if (bullets[j].position.distanceTo(e.position) < 3) {
                    scene.remove(e);
                    enemies.splice(i, 1);
                    scene.remove(bullets[j]);
                    bullets.splice(j, 1);
                    score += 10;
                    ui.scoreDisplay.innerText = score;
                    AudioController.playExplosion();
                    break;
                }
            }

            // Коллизия с игроком
            if (e && player.position.distanceTo(e.position) < 3) {
                gameOver('Столкновение!');
            }

            // Удаление улетевших
            if (e && e.position.z > player.position.z + 20) {
                scene.remove(e);
                enemies.splice(i, 1);
            }
        }

        // Облака и земля
        ground.position.z = player.position.z;
        clouds.forEach(c => {
            if (c.position.z > player.position.z + 50) {
                c.position.z = player.position.z - 500 - Math.random() * 100;
            }
        });
    }

    function checkOrientation() {
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isLandscape = window.innerWidth > window.innerHeight;
        
        // Показываем оверлей только на мобильных в ландшафтном режиме
        document.getElementById('orientation-overlay').style.display = (isMobile && isLandscape) ? 'flex' : 'none';
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        checkOrientation();
    });

    function animate() {
        const now = performance.now();
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        update(dt);
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }

    checkOrientation();
    initGameUI();
    animate();
</script>
</body>
</html>
